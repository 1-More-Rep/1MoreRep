# 1MoreRep — self-hosted stack.
# Default `docker compose up` starts: db + app + cron (supercronic sidecar).
# Optional services are gated behind profiles and excluded by default:
#   --profile caddy   → HTTPS reverse proxy (auto-TLS) in front of the app
#   --profile ollama  → local LLM server reachable at http://ollama:11434
# install.sh sets COMPOSE_PROFILES=caddy automatically for a public https APP_URL.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onemorerep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-onemorerep}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-onemorerep} -d ${POSTGRES_DB:-onemorerep}']
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-onemorerep}:${POSTGRES_PASSWORD:-devpassword}@db:5432/${POSTGRES_DB:-onemorerep}?schema=public
      PORT: '3000'
      APP_KEY: ${APP_KEY:-}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      JOB_SECRET: ${JOB_SECRET:-}
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    ports:
      # Host interface is configurable so a TLS (caddy-profile) deployment can bind the app to
      # loopback only — `APP_BIND=127.0.0.1` — keeping the plaintext app port off the public
      # interface so traffic can't bypass Caddy's TLS. Defaults to 0.0.0.0 for the simple
      # no-TLS LAN setup. install.sh sets APP_BIND=127.0.0.1 alongside COMPOSE_PROFILES=caddy.
      - '${APP_BIND:-0.0.0.0}:${APP_PORT:-3000}:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://localhost:3000/api/health\").then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # Scheduled-job runner: supercronic (a crond that runs a committed crontab).
  # curl is baked into the image (no boot-time `apk add`); each crontab line POSTs
  # to the internal jobs endpoint. Cadences live in deploy/crontab. Jobs self-gate
  # on time/idempotency, so missed/overlapping ticks are safe.
  cron:
    build:
      context: .
      dockerfile: deploy/cron.Dockerfile
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      JOB_SECRET: ${JOB_SECRET:-}
    volumes:
      - ./deploy/crontab:/etc/crontab:ro

  # --- Optional: HTTPS reverse proxy (profile: caddy) ---------------------------
  # Terminates TLS for the public domain and proxies to the app. Enable by setting
  # COMPOSE_PROFILES=caddy (install.sh does this automatically for https APP_URLs).
  # If you bring your own proxy, leave this disabled and set TRUST_PROXY=true.
  caddy:
    image: caddy:2-alpine
    profiles: [caddy]
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      # Host part of APP_URL (no scheme); set by install.sh. Caddy auto-provisions
      # a Let's Encrypt cert for this domain and serves HTTP/HTTPS on 80/443.
      CADDY_DOMAIN: ${CADDY_DOMAIN:-}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - '80:80'
      - '443:443'

  # --- Optional: local LLM (profile: ollama) ------------------------------------
  # Self-hosted model server. The app reaches it at http://ollama:11434, which
  # matches the AppSettings.llmBaseUrl default. Enable with COMPOSE_PROFILES=ollama
  # (or `docker compose --profile ollama up`). Pull a model once it's running:
  #   docker compose exec ollama ollama pull llama3.2
  ollama:
    image: ollama/ollama
    profiles: [ollama]
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama

volumes:
  db_data:
  uploads:
  caddy_data:
  caddy_config:
  ollama_models:
