# 1MoreRep — self-hosted stack.
# P0: app + postgres. Later phases add a cron sidecar (P8) and optional
# `caddy` (HTTPS) and `ollama` (LLM) profiles.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onemorerep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-onemorerep}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-onemorerep} -d ${POSTGRES_DB:-onemorerep}']
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-onemorerep}:${POSTGRES_PASSWORD:-devpassword}@db:5432/${POSTGRES_DB:-onemorerep}?schema=public
      PORT: '3000'
      APP_KEY: ${APP_KEY:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      JOB_SECRET: ${JOB_SECRET:-}
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    ports:
      - '${APP_PORT:-3000}:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://localhost:3000/api/health\").then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # Scheduled-job runner: hits the internal job endpoints hourly. Lightweight
  # loop (no cron daemon needed); jobs self-gate on time/idempotency.
  cron:
    image: alpine:3
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      JOB_SECRET: ${JOB_SECRET:-}
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        apk add --no-cache curl >/dev/null 2>&1
        echo "[cron] started"
        while true; do
          for job in streak.rollover streak.risk.notify league.settle leaderboard.refresh; do
            curl -s -m 30 -X POST -H "x-job-secret: $$JOB_SECRET" "http://app:3000/api/internal/jobs/$$job" >/dev/null 2>&1 || true
          done
          sleep 3600
        done

volumes:
  db_data:
  uploads:
