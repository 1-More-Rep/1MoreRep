name: CI

on:
  push:
    branches: [main, build]
  pull_request:

# Least privilege: jobs only need to read the repo. Granting the default token only
# `contents: read` means a compromised step can't push, open PRs, or write packages.
permissions:
  contents: read

jobs:
  static:
    name: Typecheck · Lint · Unit + Integration
    runs-on: ubuntu-latest
    # A Postgres service so the *.integration.test.ts suites actually run. Without it they
    # detect an unreachable DB and describe.skip — passing green while testing nothing.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: onemorerep
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: onemorerep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onemorerep" --health-interval 5s
          --health-timeout 5s --health-retries 12
    env:
      DATABASE_URL: postgresql://onemorerep:devpassword@localhost:5432/onemorerep?schema=public
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9.12.3
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Ephemeral per-run encryption key so NO key string is committed to the repo.
      # Required so crypto paths (2FA/TOTP, SMTP-secret save) work under the prod build.
      - run: echo "APP_KEY=$(openssl rand -base64 32)" >> "$GITHUB_ENV"
      - run: pnpm prisma generate
      - run: pnpm prisma migrate deploy
      - run: pnpm seed # integration tests assert against seeded exercise data
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  e2e:
    name: Build · E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: onemorerep
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: onemorerep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onemorerep" --health-interval 5s
          --health-timeout 5s --health-retries 12
    env:
      DATABASE_URL: postgresql://onemorerep:devpassword@localhost:5432/onemorerep?schema=public
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9.12.3
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Ephemeral per-run encryption key so NO key string is committed to the repo.
      # Required so crypto paths (2FA/TOTP, SMTP-secret save) work under the prod build.
      - run: echo "APP_KEY=$(openssl rand -base64 32)" >> "$GITHUB_ENV"
      - run: pnpm prisma generate
      - run: pnpm prisma migrate deploy
      - run: pnpm seed # e2e exercise/workout/golden journeys need seeded exercise data
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
        env:
          CI: 'true'
