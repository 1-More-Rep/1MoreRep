name: CI

on:
  push:
    branches: [main, build]
  pull_request:

jobs:
  static:
    name: Typecheck · Lint · Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  e2e:
    name: Build · E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: onemorerep
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: onemorerep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onemorerep" --health-interval 5s
          --health-timeout 5s --health-retries 12
    env:
      DATABASE_URL: postgresql://onemorerep:devpassword@localhost:5432/onemorerep?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm prisma migrate deploy
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
        env:
          CI: 'true'
